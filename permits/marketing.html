<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<title>Αίτηση Άδειας Εργασιών - MARKETING - RIVER WEST</title>

<!-- FLATPICKR CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/airbnb.css">

<!-- FLATPICKR JS -->
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/gr.js"></script>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f2f2f2;
        margin: 0;
        padding: 20px;
    }
    .page {
        width: 800px;
        margin: 0 auto;
        background: #fff;
        padding: 20px 30px;
        box-shadow: 0 0 10px rgba(0,0,0,0.15);
    }
    h1 {
        text-align: center;
        font-size: 20px;
        text-transform: uppercase;
    }
    .section-title {
        font-weight: bold;
        margin-top: 20px;
        margin-bottom: 10px;
        text-decoration: underline;
    }
    .field-group { margin-bottom: 10px; }
    .field-group label {
        display: inline-block;
        min-width: 220px;
        font-weight: bold;
    }

    /* (*) στα υποχρεωτικά */
    .field-group label.req::after {
        content: " *";
        color: #c00000;
        font-weight: bold;
    }

    .field-group input[type="text"],
    .field-group input[type="tel"],
    .field-group textarea,
    .field-group select {
        width: 60%;
        padding: 4px;
        box-sizing: border-box;
    }
    textarea { height: 70px; resize: vertical; }
    .checkbox-group { margin: 10px 0; }
    .hidden { display: none; }
    .submit-row { text-align: center; margin-top: 20px; }
    button { padding: 8px 20px; font-size: 14px; cursor: pointer; }

    .req-note{
        margin-top: 12px;
        font-size: 12px;
        color: #444;
        text-align: left;
    }
</style>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const PERMITS_EMAIL = "gkarampampas@riverwest.gr";
    const CC_EMAILS = "cremoundos@riverwest.gr";

    // DOM
    const permitForm      = document.getElementById("permitForm");

    const companyName     = document.getElementById("companyName");
    const respName        = document.getElementById("respName");
    const respMobile      = document.getElementById("respMobile");

    const workers         = document.getElementById("workers");
    const vehicles        = document.getElementById("vehicles");

    const workTypeSelect  = document.getElementById("workType");
    const otherBox        = document.getElementById("workTypeOtherBox");
    const otherText       = document.getElementById("workTypeOther");

    const startDateInput  = document.getElementById("startDate");
    const endDateInput    = document.getElementById("endDate");
    const startTimeSelect = document.getElementById("startTime");
    const endTimeSelect   = document.getElementById("endTime");

    const noiseBox        = document.getElementById("noise-box");
    const noiseConfirm    = document.getElementById("noiseConfirm");

    // TIME OPTIONS
    function populateTimes(selectEl) {
        for (let h = 0; h < 24; h++) {
            for (let m = 0; m < 60; m += 15) {
                const v = String(h).padStart(2, "0") + ":" + String(m).padStart(2, "0");
                const opt = document.createElement("option");
                opt.value = v;
                opt.textContent = v;
                selectEl.appendChild(opt);
            }
        }
    }
    populateTimes(startTimeSelect);
    populateTimes(endTimeSelect);

    // FLATPICKR
    if (window.flatpickr) {
        flatpickr("#startDate", { dateFormat: "d/m/Y", locale: "gr" });
        flatpickr("#endDate",   { dateFormat: "d/m/Y", locale: "gr" });
    }

    // NOISE DETECTION 09:00–21:00
    function minutesSinceMidnight(t) {
        const [h, m] = t.split(":").map(Number);
        return h * 60 + m;
    }
    function intervalsOverlap(a1, a2, b1, b2) {
        return a1 < b2 && b1 < a2;
    }
    function updateNoiseBox() {
        const st = startTimeSelect.value;
        const et = endTimeSelect.value;
        if (!st || !et) return;

        const w1 = minutesSinceMidnight(st);
        const w2 = minutesSinceMidnight(et);

        if (intervalsOverlap(w1, w2, 9 * 60, 21 * 60)) {
            noiseBox.classList.remove("hidden");
            noiseConfirm.required = true;
        } else {
            noiseBox.classList.add("hidden");
            noiseConfirm.required = false;
            noiseConfirm.checked = false;
        }
    }
    startTimeSelect.addEventListener("change", updateNoiseBox);
    endTimeSelect.addEventListener("change", updateNoiseBox);

    // Show description box when Εκδήλωση - Marketing or Άλλη εργασία
    function needsOther() {
        return (workTypeSelect.value === "Άλλη εργασία" || workTypeSelect.value === "Εκδήλωση - Marketing");
    }
    function updateOtherBox() {
        if (needsOther()) {
            otherBox.classList.remove("hidden");
            otherText.required = true;
        } else {
            otherBox.classList.add("hidden");
            otherText.required = false;
            otherText.value = "";
        }
    }
    workTypeSelect.addEventListener("change", updateOtherBox);

    // Helpers
    function parseDateTime(dateStr, timeStr) {
        const [dd, mm, yyyy] = dateStr.split("/");
        const [HH, MM] = timeStr.split(":");
        return new Date(Number(yyyy), Number(mm) - 1, Number(dd), Number(HH), Number(MM));
    }

    // SUBMIT
    permitForm.addEventListener("submit", function (event) {
        event.preventDefault();

        if (!permitForm.checkValidity()) {
            permitForm.reportValidity();
            return;
        }

        // Mobile validation (10 digits)
        const respMob = respMobile.value.trim().replace(/\D/g, "");
        if (respMob.length !== 10) {
            alert("Το κινητό υπευθύνου πρέπει να έχει 10 ψηφία.");
            return;
        }

        const sdStr = startDateInput.value.trim();
        const edStr = endDateInput.value.trim();
        const stStr = startTimeSelect.value;
        const etStr = endTimeSelect.value;

        const startDT = parseDateTime(sdStr, stStr);
        const endDT   = parseDateTime(edStr, etStr);

        if (isNaN(startDT.getTime()) || isNaN(endDT.getTime())) {
            alert("Μη έγκυρη ημερομηνία ή ώρα.");
            return;
        }
        if (endDT <= startDT) {
            alert("Η λήξη (ημερομηνία και ώρα) πρέπει να είναι μετά την έναρξη.");
            return;
        }

        // Max duration 7 days
        const maxDT = new Date(startDT);
        maxDT.setDate(maxDT.getDate() + 7);
        if (endDT > maxDT) {
            alert("Η διάρκεια μπορεί να είναι έως 7 ημέρες.");
            return;
        }

        const lines = [
            "=== ΑΙΤΗΣΗ ΕΡΓΑΣΙΩΝ MARKETING RIVER WEST ===",
            "",
            "Επωνυμία Εταιρίας: " + companyName.value,
            "Υπεύθυνος: " + respName.value,
            "Κινητό Υπευθύνου: " + respMobile.value,
            "Ονόματα Εργαζομένων: " + (workers.value.trim() || "-"),
            "Οχήματα: " + (vehicles.value.trim() || "-"),
            "Είδος Εργασιών: " + workTypeSelect.value,
            (needsOther() ? ("Περιγραφή: " + (otherText.value.trim() || "-")) : null),
            "Ημ/νία Έναρξης: " + sdStr,
            "Ώρα Έναρξης: " + stStr,
            "Ημ/νία Λήξης: " + edStr,
            "Ώρα Λήξης: " + etStr
        ].filter(Boolean);

        const subject = "Αίτηση Άδειας Εργασιών - MARKETING - " + companyName.value;

        const mailto =
            "mailto:" + encodeURIComponent(PERMITS_EMAIL) +
            "?cc=" + encodeURIComponent(CC_EMAILS) +
            "&subject=" + encodeURIComponent(subject) +
            "&body=" + encodeURIComponent(lines.join("\n"));

        alert("Θα ανοίξει τώρα το email σας με την αίτηση έτοιμη.");
        window.location.href = mailto;
    });
});
</script>
</head>

<body>
<div class="page">

<h1>Αίτηση Άδειας Εργασιών - Marketing<br>ΕΜΠΟΡΙΚΟ ΚΕΝΤΡΟ RIVER WEST</h1>

<form id="permitForm">

    <div class="section-title">ΣΤΟΙΧΕΙΑ ΑΙΤΗΜΑΤΟΣ MARKETING</div>

    <div class="field-group">
        <label class="req">Επωνυμία Εταιρίας:</label>
        <input type="text" id="companyName" required>
    </div>

    <div class="field-group">
        <label class="req">Υπεύθυνος:</label>
        <input type="text" id="respName" required>
    </div>

    <div class="field-group">
        <label class="req">Κινητό Υπευθύνου:</label>
        <input type="tel" id="respMobile" required placeholder="10 ψηφία">
    </div>

    <div class="field-group">
        <label>Ονόματα Εργαζομένων:</label>
        <textarea id="workers" placeholder="Προαιρετικό Πεδίο"></textarea>
    </div>

    <div class="field-group">
        <label>Οχήματα:</label>
        <textarea id="vehicles" placeholder="Προαιρετικό Πεδίο"></textarea>
    </div>

    <div class="section-title">ΣΤΟΙΧΕΙΑ ΕΡΓΑΣΙΩΝ MARKETING</div>

    <div class="field-group">
        <label class="req">Είδος Εργασιών:</label>
        <select id="workType" required>
            <option value="">-- Επιλέξτε --</option>
            <option>Στήσιμο προωθητικού / Διακόσμησης - Marketing</option>
            <option>Αποξήλωση προωθητικού - Marketing</option>
            <option>Ανανέωση Αυτοκόλλητων Βιτρίνας - Marketing</option>
            <option value="Εκδήλωση - Marketing">Εκδήλωση - Marketing</option>
            <option value="Άλλη εργασία">Άλλη εργασία</option>
        </select>
    </div>

    <div class="field-group hidden" id="workTypeOtherBox">
        <label class="req">Περιγραφή (για Εκδήλωση / Άλλη εργασία):</label>
        <textarea id="workTypeOther"></textarea>
    </div>

    <div class="section-title">ΗΜΕΡΟΜΗΝΙΕΣ &amp; ΩΡΕΣ</div>

    <div class="field-group">
        <label class="req">Ημ/νία Έναρξης:</label>
        <input type="text" id="startDate" required>
    </div>

    <div class="field-group">
        <label class="req">Ώρα Έναρξης:</label>
        <select id="startTime" required></select>
    </div>

    <div class="field-group">
        <label class="req">Ημ/νία Λήξης:</label>
        <input type="text" id="endDate" required>
    </div>

    <div class="field-group">
        <label class="req">Ώρα Λήξης:</label>
        <select id="endTime" required></select>
    </div>

    <!-- NOISE BOX -->
    <div id="noise-box" class="checkbox-group hidden">
        <input type="checkbox" id="noiseConfirm">
        <label for="noiseConfirm" class="req">
            <strong>
                ΔΕΣΜΕΥΟΜΑΙ ΟΤΙ ΟΙ ΕΡΓΑΣΙΕΣ ΔΕΝ ΘΑ ΠΡΟΚΑΛΕΣΟΥΝ ΟΧΛΗΣΗ ΚΑΤΑ ΤΗ ΔΙΑΡΚΕΙΑ
                ΛΕΙΤΟΥΡΓΙΑΣ ΤΟΥ ΕΜΠΟΡΙΚΟΥ (09:00–21:00).
            </strong>
        </label>
    </div>

    <!-- CHECKBOXES -->
    <div class="checkbox-group">
        <input type="checkbox" id="c1" required>
        <label for="c1" class="req">Αναλαμβάνω πλήρως την ευθύνη για τις εργασίες που θα εκτελεστούν.</label>
    </div>

    <div class="checkbox-group">
        <input type="checkbox" id="c2" required>
        <label for="c2" class="req">Δηλώνω ότι τα παραπάνω στοιχεία είναι αληθή και αποδέχομαι τους όρους του Εμπορικού Κέντρου.</label>
    </div>

    <div class="req-note">Τα πεδία με (*) είναι υποχρεωτικά.</div>

    <div class="submit-row">
        <button type="submit">Υποβολή Αίτησης</button>
    </div>

</form>
</div>
</body>
</html>
